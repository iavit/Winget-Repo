version: '3.8'

services:
  winget-repo:
    build: .
    container_name: winget-repo
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-5000}
      - WAITRESS_THREADS=${WAITRESS_THREADS:-8}
      - FLASK_LIMITER_STORAGE_URI=${FLASK_LIMITER_STORAGE_URI:-redis://redis:6379/0}
      - SLOWAPI_LIMITER_STORAGE_URI=${SLOWAPI_LIMITER_STORAGE_URI:-redis://redis:6379/1}
    volumes:
      # Map local folders to container folders to persist data
      # Adjust these paths based on where Winget-Repo saves its DB and files
      - ./Data:/app/Data 
      - ./Packages:/app/Packages
      - ./SSL:/app/SSL
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: winget-repo-redis
    restart: unless-stopped
